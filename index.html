<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width", initial-scale="1">
    <title>꿈-황인숙</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Nanum Pen Script', cursive;
            /* Permalink - use to edit and share this gradient: https://colorzilla.com/gradient-editor/#ebe9f9+0,d8d0ef+31,cec7ec+77,c1bfea+100 */
            background: linear-gradient(to bottom,  #ebe9f9 0%,#d8d0ef 31%,#cec7ec 77%,#c1bfea 100%); /* W3C, IE10+, FF16+, Chrome26+, Opera12+, Safari7+ */
            text-align: center;

        }
        h1 {
            margin-top: 70px;
            font-size: 70px;
            color:#2F8FC7;
        }

        .poem{
            margin-top: 10px;
            font-size: 40px;
            color:#2F8FC7;
            line-height: 1.8;
        }

        .author{
            margin-top: 10px;
            font-size: 30px;
            color:#2F8FC7;
            margin-left: 250px;
        }

        @media screen and (max-width: 768px) {
            h1 {
                margin-top: 10vh;
                font-size: 50px;
            }

            .author {
                margin-top: 40px;
                font-size: 25px;
                margin-left: 200px;
            }

            .poem {
                margin-top: 30px;
                font-size: 24px;
                line-height: 1.8;
            }
        }
    </style>
   
</head>
<body>
    <h1>꿈</h1>

     <div class="author">
        -황인숙-
    </div>

    <div class="poem">
        가끔 네 꿈을 꾼다<br>
        전에는 꿈이라도 꿈인줄 모르겠더니<br>
        이제는 너를 보면<br>
        아, 꿈이로구나<br>
        알아챈다
    </div>

</body>
</html>
